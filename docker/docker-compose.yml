services:
  mysql:
    image: mysql:8.4
    container_name: javasql-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: rootpwd
      MYSQL_DATABASE: remedy_mts
      MYSQL_USER: app
      MYSQL_PASSWORD: apppwd
      TZ: UTC
    ports:
      - "3307:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./seed.sql:/docker-entrypoint-initdb.d/10-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpwd"]
      interval: 5s
      timeout: 5s
      retries: 20
